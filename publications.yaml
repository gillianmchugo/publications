    bulk RNA-seq (n = 6 per group, representing a total of 48 RNA-seq
    libraries). Relatively low numbers of differentially expressed genes (DEGs)
    were observed between most cell subsets; however, 189 genes were
    significantly differentially expressed in the M. bovis-infected compared to
    the control groups for the WC1.1+ γδ T cell compartment (absolute log2 FC ≥
    1.5 and FDR Padj. ≤ 0.1). The majority of these DEGs (168) were
    significantly increased in expression in cells from the bTB+ cattle and
    included genes encoding transcription factors (TBX21 and EOMES), chemokine
    receptors (CCR5 and CCR7), granzymes (GZMA, GZMM, and GZMH) and multiple
    killer cell immunoglobulin-like receptor (KIR) proteins indicating cytotoxic
    functions. Biological pathway overrepresentation analysis revealed
    enrichment of genes with multiple immune functions including cell
    activation, proliferation, chemotaxis, and cytotoxicity of lymphocytes. In
    conclusion, γδ T cells have important inflammatory and regulatory functions
    in cattle, and we provide evidence for preferential differential activation
    of the WC1.1+ specific subset in cattle naturally infected with M. bovis.
