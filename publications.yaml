    numbers of significantly differentially expressed genes (DEGs; B-H
    Padj. ≤ 0.05) with increased and decreased expression, respectively. The
    position on the horizontal indicates the number of days post-infection (dpi)
    and the colour of the bars represents the tissue. The direct (DIRE)
    contrasts identify changes in expression in the N'Dama samples relative to
    the Boran samples (DIREi = Ni – Bi, where N represents the N'Dama population
    and B represents the Boran population), the N'Dama (NDAM) and Boran (BORA)
    contrasts identify changes in expression within the populations relative to
    time 0 (NDAMi = Ni – N0; BORAi = Bi – B0), and the response (RESP) contrasts
    identify changes in expression over time in the N'Dama samples relative to
    the Boran (RESPi = [Ni – N0] – [Bi – B0]). The tissues include blood (BL),
    liver (LI), lymph node (LN), and spleen (SP) samples.
